name: iOS Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      simulator_destination:
        description: Xcode destination string for the simulator
        required: false
        default: platform=iOS Simulator,name=iPhone 16

concurrency:
  group: ios-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on:
      - self-hosted
      - macOS
      - Xcode
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Show Available Simulators
        run: xcrun simctl list devices available

      - name: Run Unit Tests
        env:
          IOS_SIMULATOR_DESTINATION: ${{ github.event.inputs.simulator_destination }}
        run: ./scripts/ci/test_ios.sh
