name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on:
      - self-hosted
      - macOS
      - Xcode
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build
        run: ./scripts/ci/build_ios.sh
